<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="실시간 번역">
<meta name="theme-color" content="#0f172a">
<title>실시간 번역</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<link rel="stylesheet" href="style.css">
</head>
<body>
<div id="app">
  <header>
    <h1>실시간 번역</h1>
    <button id="settingsBtn" aria-label="설정">⚙️</button>
  </header>

  <main>
    <div id="transcript" aria-live="polite">
      <p class="placeholder">마이크 버튼을 눌러 시작하거나, 파일을 업로드하세요.</p>
    </div>
  </main>

  <footer>
    <button id="uploadBtn" class="side-btn" aria-label="파일 업로드">📁</button>
    <button id="micBtn" aria-label="녹음 시작">🎙️</button>
    <button id="clearBtn" class="side-btn" aria-label="지우기">🗑️</button>
    <input id="fileInput" type="file" accept="audio/*" hidden>
  </footer>

  <div id="status"></div>
</div>

<dialog id="settingsDialog">
  <h2>설정</h2>
  <label for="hfToken">Hugging Face API 토큰</label>
  <input id="hfToken" type="password" placeholder="hf_로 시작하는 토큰 붙여넣기">
  <p class="hint">
    huggingface.co 무료 가입 → Settings → Access Tokens 에서
    "Read" 권한 토큰을 발급받아 붙여넣으세요. 토큰은 이 기기에만 저장됩니다.
  </p>
  <div class="dialog-actions">
    <button id="saveTokenBtn">저장</button>
    <button id="closeSettingsBtn">닫기</button>
  </div>
</dialog>

<script src="app.js"></script>
</body>
</html>
